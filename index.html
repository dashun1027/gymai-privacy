<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GymAI · 法律文件 Legal</title>
  <style>
    :root {
      --bg: #09090b; --card: #1e1e22; --border: #2d2d30;
      --text: #e7e7ea; --muted: #a1a1aa; --green: #22c55e; --purple: #a855f7;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC",
        "Microsoft JhengHei", Roboto, Helvetica, Arial, sans-serif;
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .wrap { max-width: 540px; width: 100%; text-align: center; }
    h1 { font-size: 30px; margin: 0 0 6px; letter-spacing: -0.4px; }
    p.sub { color: var(--muted); margin: 0 0 32px; }
    a.card {
      display: block; text-decoration: none; color: var(--text);
      background: var(--card); border: 1px solid var(--border);
      border-radius: 18px; padding: 20px 22px; margin: 14px 0; text-align: left;
      transition: border-color .15s ease, transform .15s ease;
    }
    a.card:hover { transform: translateY(-2px); }
    a.card.green:hover { border-color: rgba(34,197,94,.6); }
    a.card.purple:hover { border-color: rgba(168,85,247,.6); }
    .t { font-size: 17px; font-weight: 800; }
    .d { font-size: 13px; color: var(--muted); margin-top: 4px; }
    .emoji { font-size: 20px; margin-right: 8px; }
    footer { margin-top: 28px; color: var(--muted); font-size: 12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>👾 GymAI</h1>
    <p class="sub">法律文件 · Legal Documents</p>

    <a class="card green" href="./privacy-policy.html">
      <div class="t"><span class="emoji">🔒</span>隱私權政策</div>
      <div class="d">Privacy Policy — 資料收集、權限宣告與帳號刪除</div>
    </a>

    <a class="card purple" href="./terms-of-service.html">
      <div class="t"><span class="emoji">📜</span>服務條款</div>
      <div class="d">Terms of Service — 訂閱規範與醫療免責聲明</div>
    </a>

    <footer>© 2026 GymAI 開發團隊</footer>
  </div>
</body>
</html>
